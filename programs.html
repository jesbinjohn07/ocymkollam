<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programs - OCYM Kollam</title>
  
  <meta name="description" content="Programs and Events of OCYM Kollam Diocese">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-box">
      <!-- Logo Container with fallback -->
      <div style="width: 80px; height: 80px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center;">
        <img src="images/logo.png" class="logo" alt="OCYM Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div style="display:none; width: 70px; height: 70px;">
          <svg viewBox="0 0 100 100" style="width: 100%; height: 100%;">
            <circle cx="50" cy="50" r="45" fill="#0b3c5d" stroke="#ffd700" stroke-width="3"/>
            <path d="M50 15 v70 M35 30 h30 M30 45 h40 M38 72 l24 -8" stroke="#ffd700" stroke-width="6" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <h1>OCYM Kollam</h1>
      <p class="subtitle">Orthodox Christian Youth Movement</p>
      <p class="diocese">Kollam Diocese</p>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="notice.html">Notice</a>
      <a href="registration.html">Registration</a>
      <a href="programs.html" class="active">Programs</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="programs-section" style="margin-top: 20px;">
      <h2>✨ OCYM Programs</h2>

      <!-- SEARCH BAR -->
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search programs by title, year, or keywords...">
      </div>

      <!-- PROGRAMS CONTAINER -->
      <div id="programsContainer">
        <!-- Bouncing Loader -->
        <div class="loader">
          <div class="dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <p>Fetching activities from database…</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 OCYM Kollam | All Rights Reserved</p>
  </footer>

  <!-- ==========================================
       PROGRAM DETAIL MODAL
       ========================================== -->
  <div class="modal" id="programModal">
    <button class="close-btn" onclick="closeModal()" aria-label="Close modal">×</button>
    <div class="modal-content">
      <!-- Modal image with custom fallback layout -->
      <div style="position: relative; width: 100%; max-height: 280px; background: #062f4f; display: flex; align-items: center; justify-content: center; overflow: hidden;">
        <img id="modalImage" alt="Program Banner" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div id="modalImageFallback" style="display:none; width: 100%; height: 280px;">
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="width: 100%; height: 100%;">
            <rect width="100" height="100" fill="#0b3c5d"/>
            <circle cx="50" cy="50" r="22" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.25"/>
            <path d="M50 35 v30 M42 43 h16 M40 50 h20 M44 61 l12 -4" stroke="#ffd700" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
          </svg>
        </div>
      </div>
      
      <div class="modal-body">
        <h3 id="modalTitle"></h3>
        <div class="modal-meta">
          <div class="modal-chip" id="modalYear"></div>
          <div class="modal-chip" id="modalDate"></div>
        </div>
        <p id="modalDescription"></p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzb9l6Ce2ShxIpJccCBZoPxZ-ZCEqyH2twcA5E_fIH2ohvaZGIxycEcF1jqQQ5GWaehaA/exec";
    let allPrograms = [];

    /* =========================
       FETCH DATA FROM SPREADSHEET
       ========================= */
    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        allPrograms = data;
        renderPrograms(data);
      })
      .catch(err => {
        document.getElementById("programsContainer").innerHTML = `
          <div class="empty-state" style="border-color: #ef4444;">
            <p>❌ Unable to load programs. Please check your internet connection.</p>
          </div>
        `;
        console.error("Programs load failed:", err);
      });

    /* =========================
       RENDER PROGRAMS GRID
       ========================= */
    function renderPrograms(data){
      const container = document.getElementById("programsContainer");
      container.innerHTML = "";

      if(!data || data.length === 0){
        container.innerHTML = `
          <div class="empty-state">
            <p>📭 No programs found matching your search query.</p>
          </div>
        `;
        return;
      }

      // Group by year
      let years = {};
      data.forEach(item => {
        if(!years[item.year]){
          years[item.year] = [];
        }
        years[item.year].push(item);
      });

      // Render years sorted descending
      Object.keys(years)
        .sort()
        .reverse()
        .forEach((year, index) => {
          let cards = "";

          years[year].forEach(p => {
            const imagePath = p.image || "images/logo.png";
            
            // We escape quotes to avoid syntax breakdown in inline JS attributes
            const cleanTitle = p.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const cleanDesc = p.description ? p.description.replace(/'/g, "\\'").replace(/"/g, '&quot;') : "";
            const cleanDate = p.date ? p.date.replace(/'/g, "\\'").replace(/"/g, '&quot;') : "Program";
            
            cards += `
              <div class="program-card" onclick="openModal('${imagePath}', '${cleanTitle}', '${cleanDesc}', '${year}', '${cleanDate}')">
                <!-- Fallback wrapper -->
                <div style="position: relative; width: 100%; height: 170px; background: #062f4f; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                  <img loading="lazy" src="${imagePath}" alt="${p.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                  <div style="display:none; width: 100%; height: 100%;">
                    <svg viewBox="0 0 100 100" style="width: 100%; height: 100%;">
                      <rect width="100" height="100" fill="#0b3c5d" opacity="0.9"/>
                      <circle cx="50" cy="50" r="25" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.2"/>
                      <path d="M50 35 v30 M42 43 h16 M40 50 h20 M44 61 l12 -4" stroke="#ffd700" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
                    </svg>
                  </div>
                </div>
                
                <div class="program-info">
                  <div class="program-date">${p.date || "Program"}</div>
                  <h4>${p.title}</h4>
                  <div class="tap-view">Tap to View details</div>
                </div>
              </div>
            `;
          });

          // Open the first year block by default, collapse others
          const openClass = index === 0 ? "open" : "";

          container.innerHTML += `
            <div class="year-block ${openClass}">
              <div class="year-header" onclick="toggleYear(this)">
                <div class="year-title">📅 Academic Year ${year}</div>
                <div class="arrow">▼</div>
              </div>
              <div class="year-content">
                <div class="program-grid">
                  ${cards}
                </div>
              </div>
            </div>
          `;
        });
    }

    /* =========================
       TOGGLE ACCORDION
       ========================= */
    function toggleYear(headerEl){
      headerEl.parentElement.classList.toggle("open");
    }

    /* =========================
       MODAL CONTROLS
       ========================= */
    function openModal(image, title, description, year, date){
      const modalImg = document.getElementById("modalImage");
      const modalFallback = document.getElementById("modalImageFallback");

      // Reset fallback state
      modalImg.style.display = "block";
      modalFallback.style.display = "none";

      modalImg.src = image;
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalDescription").innerText = description || "No detailed description provided for this program.";
      document.getElementById("modalYear").innerText = "📅 Year: " + year;
      document.getElementById("modalDate").innerText = "✨ Date: " + date;

      document.getElementById("programModal").classList.add("active");
      document.body.style.overflow = "hidden"; // disable background scrolling
    }

    function closeModal(){
      document.getElementById("programModal").classList.remove("active");
      document.body.style.overflow = ""; // restore scrolling
    }

    /* Close modal when clicking on background overlay */
    window.onclick = function(e){
      const modal = document.getElementById("programModal");
      if(e.target === modal){
        closeModal();
      }
    }

    /* =========================
       SEARCH FILTER
       ========================= */
    document.getElementById("searchInput").addEventListener("input", function(){
      const query = this.value.toLowerCase();
      const filtered = allPrograms.filter(p => 
        p.title.toLowerCase().includes(query) || 
        p.year.toString().includes(query) || 
        (p.description && p.description.toLowerCase().includes(query))
      );
      renderPrograms(filtered);
    });
  </script>

</body>
</html>
